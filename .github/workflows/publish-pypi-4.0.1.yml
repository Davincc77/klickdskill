name: Publish klickd 4.0.1 to PyPI

# Packaging-only patch release for the klickd Python distribution. Adds
# bundled starter .klickd skills under klickd/starter_skills/. The stable
# spec release remains v4.0.0 (DOI, GitHub Release). This workflow:
#
#   - is workflow_dispatch only (no release / tag triggers)
#   - never creates a git tag or GitHub Release
#   - hard-pins the published version to 4.0.1
#   - defaults the build ref to the merged main commit
#
# Run from the Actions UI after the 4.0.1 packaging PR is merged.

on:
  workflow_dispatch:
    inputs:
      ref:
        description: 'Git ref to build from (branch or commit SHA). No tag is required.'
        required: false
        default: 'main'
      expected_version:
        description: 'Exact pyproject.toml version required to publish (must be 4.0.1).'
        required: false
        default: '4.0.1'

jobs:
  build-and-publish-401:
    name: Build sdist+wheel and publish klickd 4.0.1 to PyPI
    runs-on: ubuntu-latest
    environment: pypi
    permissions:
      id-token: write
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.inputs.ref || 'main' }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Verify pyproject version is 4.0.1
        working-directory: packages/pypi/klickd
        run: |
          PKG_VERSION=$(python -c "import tomllib; print(tomllib.loads(open('pyproject.toml','rb').read().decode())['project']['version'])")
          EXPECTED="${{ github.event.inputs.expected_version || '4.0.1' }}"
          echo "Package version:  $PKG_VERSION"
          echo "Expected version: $EXPECTED"
          if [ "$PKG_VERSION" != "$EXPECTED" ]; then
            echo "ERROR: pyproject.toml version $PKG_VERSION does not match expected $EXPECTED. Refusing to publish."
            exit 1
          fi
          if [ "$EXPECTED" != "4.0.1" ]; then
            echo "ERROR: this workflow is hard-pinned to 4.0.1; expected_version must be 4.0.1."
            exit 1
          fi

      - name: Verify starter skills are present in package source
        working-directory: packages/pypi/klickd
        run: |
          test -d src/klickd/starter_skills
          test -f src/klickd/starter_skills/manifest.json
          test -f src/klickd/starter_skills/user.klickd
          test -f src/klickd/starter_skills/student.klickd
          test -f src/klickd/starter_skills/research.klickd
          test -f src/klickd/starter_skills/coding.klickd

      - name: Install build tooling
        run: python -m pip install --upgrade build

      - name: Build distributions
        working-directory: packages/pypi/klickd
        run: python -m build --sdist --wheel --outdir dist/

      - name: Verify wheel and sdist contain starter skills
        working-directory: packages/pypi/klickd
        run: |
          python -m pip install --upgrade pkginfo
          python - <<'PY'
          import os, sys, zipfile, tarfile, glob
          ok = True
          required_wheel = {
              "klickd/starter_skills/manifest.json",
              "klickd/starter_skills/user.klickd",
              "klickd/starter_skills/student.klickd",
              "klickd/starter_skills/research.klickd",
              "klickd/starter_skills/coding.klickd",
          }
          for whl in glob.glob("dist/*.whl"):
              with zipfile.ZipFile(whl) as z:
                  names = set(z.namelist())
              missing = required_wheel - names
              if missing:
                  print(f"FAIL: wheel {whl} missing: {sorted(missing)}")
                  ok = False
              else:
                  print(f"OK:   wheel {whl} contains all starter skills")
          for sd in glob.glob("dist/*.tar.gz"):
              with tarfile.open(sd) as t:
                  names = {os.path.relpath(n, n.split('/')[0]) for n in t.getnames()}
              required_sdist = {
                  "src/klickd/starter_skills/manifest.json",
                  "src/klickd/starter_skills/user.klickd",
                  "src/klickd/starter_skills/student.klickd",
                  "src/klickd/starter_skills/research.klickd",
                  "src/klickd/starter_skills/coding.klickd",
              }
              missing = required_sdist - names
              if missing:
                  print(f"FAIL: sdist {sd} missing: {sorted(missing)}")
                  ok = False
              else:
                  print(f"OK:   sdist {sd} contains all starter skills")
          sys.exit(0 if ok else 1)
          PY

      - name: Publish to PyPI via Trusted Publishing
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: packages/pypi/klickd/dist

name: .klickd Cross-Impl Test Vectors

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  python:
    name: Python — test vectors
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - run: pip install cryptography
      - run: python3 verify_vectors.py

  javascript:
    name: JavaScript — test vectors
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - run: node --experimental-vm-modules verify_vectors.mjs 2>/dev/null || node verify_vectors.mjs

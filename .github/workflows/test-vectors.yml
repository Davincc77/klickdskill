name: klickd Cross-Impl Test Vectors

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  python:
    name: Python test vectors (v2.5 + v3.0)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install dependencies
        run: pip install cryptography argon2-cffi
      - name: Run all suites (v2.5 + v3.0 — 32 vectors)
        run: python3 verify_vectors.py

  javascript:
    name: JavaScript test vectors (v2.5 — Argon2id skipped, Web Crypto limitation)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Run v2.5 suite (v3.0 Argon2id vectors skipped — Web Crypto has no Argon2id)
        run: node verify_vectors.mjs

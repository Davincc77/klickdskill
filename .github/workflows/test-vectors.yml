name: klickd Cross-Impl Test Vectors

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  python:
    name: Python — v2.5 + v3.0 (32 vectors)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install dependencies
        run: pip install cryptography argon2-cffi
      - name: Run all suites (v2.5 + v3.0 — 32 vectors)
        run: python3 verify_vectors.py

  javascript:
    name: JavaScript — v2.5 + v3.0 via hash-wasm Argon2id
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Install hash-wasm (WASM Argon2id — no native binding required)
        run: npm install hash-wasm
      - name: Run all suites (v2.5 + v3.0 via hash-wasm)
        run: node verify_vectors.mjs

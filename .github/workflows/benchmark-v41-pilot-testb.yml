name: Benchmark v4.1 — Gemini Test B Pilot (controlled)

# Safe, manual-only workflow to run the controlled v4.1 Test B pilot
# against Gemini. This workflow is intentionally limited:
#
#   - workflow_dispatch only (no push / pull_request triggers).
#   - Pilot only: hard-capped at 10 users and concurrency 2 in this CI.
#   - Test B only — Test A is run by the sibling workflow.
#   - Provider must be gemini; this workflow refuses anything else.
#   - No full run path is wired (the runner itself refuses --full).
#   - No publish / no tag / no release / no Zenodo / no npm / no PyPI.
#   - The harness makes NO Mem0 compatibility claim.
#   - GEMINI_API_KEY is only set on the single execute step; never echoed.
#
# Inputs are validated before any step touches the secret.

on:
  workflow_dispatch:
    inputs:
      users:
        description: "Pilot users (>=1, <=10). Hard-capped at 10 in this workflow."
        required: false
        default: "10"
      concurrency:
        description: "Parallel calls (>=1, <=2). Hard-capped at 2 in this workflow."
        required: false
        default: "2"
      seed:
        description: "Deterministic fixture seed."
        required: false
        default: "4242"
      sessions_per_user:
        description: "Sessions per user for the Test B fixture generator."
        required: false
        default: "15"
      provider:
        description: "Provider (only 'gemini' is allowed in this workflow)."
        required: false
        default: "gemini"
      execute:
        description: "Actually call Gemini (true) or stay plan-only (false)."
        required: false
        default: "true"
      retry_max:
        description: "Max retries on transient 5xx/UNAVAILABLE/RESOURCE_EXHAUSTED (>=0, <=8)."
        required: false
        default: "5"
      retry_backoff:
        description: "Base exponential backoff in seconds (>=0, <=10). Default 2."
        required: false
        default: "2"
      retry_backoff_max:
        description: "Max single backoff in seconds (>=0, <=30). Default 30."
        required: false
        default: "30"

permissions:
  contents: read

concurrency:
  group: benchmark-v41-pilot-testb
  cancel-in-progress: false

jobs:
  pilot_test_b:
    name: v4.1 Test B pilot (Gemini, controlled)
    runs-on: ubuntu-latest
    timeout-minutes: 30
    env:
      INPUT_USERS: ${{ github.event.inputs.users }}
      INPUT_CONCURRENCY: ${{ github.event.inputs.concurrency }}
      INPUT_SEED: ${{ github.event.inputs.seed }}
      INPUT_SESSIONS_PER_USER: ${{ github.event.inputs.sessions_per_user }}
      INPUT_PROVIDER: ${{ github.event.inputs.provider }}
      INPUT_EXECUTE: ${{ github.event.inputs.execute }}
      INPUT_RETRY_MAX: ${{ github.event.inputs.retry_max }}
      INPUT_RETRY_BACKOFF: ${{ github.event.inputs.retry_backoff }}
      INPUT_RETRY_BACKOFF_MAX: ${{ github.event.inputs.retry_backoff_max }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Validate inputs (hard caps; provider must be gemini)
        run: |
          set -euo pipefail
          users="${INPUT_USERS:-10}"
          conc="${INPUT_CONCURRENCY:-2}"
          provider="${INPUT_PROVIDER:-gemini}"
          execute="${INPUT_EXECUTE:-true}"
          sessions="${INPUT_SESSIONS_PER_USER:-15}"

          case "$users" in ''|*[!0-9]*) echo "users must be a positive integer (got: $users)"; exit 2;; esac
          case "$conc"  in ''|*[!0-9]*) echo "concurrency must be a positive integer (got: $conc)"; exit 2;; esac
          case "${INPUT_SEED:-4242}" in ''|*[!0-9]*) echo "seed must be a non-negative integer"; exit 2;; esac
          case "$sessions" in ''|*[!0-9]*) echo "sessions_per_user must be a positive integer (got: $sessions)"; exit 2;; esac

          if [ "$users" -lt 1 ] || [ "$users" -gt 10 ]; then
            echo "users must be in [1, 10] (got: $users). Hard cap enforced by this workflow."
            exit 2
          fi
          if [ "$conc" -lt 1 ] || [ "$conc" -gt 2 ]; then
            echo "concurrency must be in [1, 2] (got: $conc). Hard cap enforced by this workflow."
            exit 2
          fi
          if [ "$provider" != "gemini" ]; then
            echo "provider must be 'gemini' (got: $provider). This workflow only allows gemini."
            exit 2
          fi
          if [ "$execute" != "true" ] && [ "$execute" != "false" ]; then
            echo "execute must be 'true' or 'false' (got: $execute)."
            exit 2
          fi
          if [ "$sessions" -lt 1 ] || [ "$sessions" -gt 50 ]; then
            echo "sessions_per_user must be in [1, 50] (got: $sessions)."
            exit 2
          fi

          retry_max="${INPUT_RETRY_MAX:-5}"
          retry_backoff="${INPUT_RETRY_BACKOFF:-2}"
          retry_backoff_max="${INPUT_RETRY_BACKOFF_MAX:-30}"
          case "$retry_max" in ''|*[!0-9]*) echo "retry_max must be a non-negative integer (got: $retry_max)"; exit 2;; esac
          if ! printf '%s' "$retry_backoff" | grep -Eq '^[0-9]+(\.[0-9]+)?$'; then
            echo "retry_backoff must be a non-negative number (got: $retry_backoff)"; exit 2
          fi
          if ! printf '%s' "$retry_backoff_max" | grep -Eq '^[0-9]+(\.[0-9]+)?$'; then
            echo "retry_backoff_max must be a non-negative number (got: $retry_backoff_max)"; exit 2
          fi
          if [ "$retry_max" -gt 8 ]; then
            echo "retry_max is capped at 8 in this workflow (got: $retry_max)."
            exit 2
          fi
          backoff_int="${retry_backoff%.*}"
          backoff_max_int="${retry_backoff_max%.*}"
          if [ "${backoff_int:-0}" -gt 10 ]; then
            echo "retry_backoff is capped at 10s in this workflow (got: $retry_backoff)."
            exit 2
          fi
          if [ "${backoff_max_int:-0}" -gt 30 ]; then
            echo "retry_backoff_max is capped at 30s in this workflow (got: $retry_backoff_max)."
            exit 2
          fi

          echo "Validated inputs: users=$users concurrency=$conc seed=${INPUT_SEED:-4242} sessions_per_user=$sessions provider=$provider execute=$execute retry_max=$retry_max retry_backoff=$retry_backoff retry_backoff_max=$retry_backoff_max"

      - name: Preflight — GEMINI_API_KEY secret presence
        if: ${{ github.event.inputs.execute == 'true' }}
        env:
          HAS_KEY: ${{ secrets.GEMINI_API_KEY != '' }}
        run: |
          set -euo pipefail
          if [ "${HAS_KEY}" != "true" ]; then
            echo "secrets.GEMINI_API_KEY is missing or empty. Configure the repository secret before dispatching with execute=true."
            exit 2
          fi
          echo "Preflight OK: GEMINI_API_KEY secret is present (value not echoed)."

      - name: Install minimal Python dependencies
        run: |
          set -euo pipefail
          python -m pip install --upgrade pip
          if [ "${INPUT_EXECUTE:-true}" = "true" ]; then
            pip install google-genai
          fi

      - name: Generate fixtures (Test B, no LLM)
        run: |
          set -euo pipefail
          python3 benchmarks/v4.1/fixtures/generator.py \
            --seed "${INPUT_SEED:-4242}" \
            --users 500 \
            --sessions-per-user "${INPUT_SESSIONS_PER_USER:-15}" \
            --out benchmarks/v4.1/fixtures/generated

      - name: Dry-run (no provider call)
        run: |
          set -euo pipefail
          python3 benchmarks/v4.1/runner/runner.py dry-run

      - name: Pilot Test B — plan only (no provider call)
        run: |
          set -euo pipefail
          python3 benchmarks/v4.1/runner/runner.py pilot-test-b \
            --users "${INPUT_USERS:-10}" \
            --provider gemini \
            --concurrency "${INPUT_CONCURRENCY:-2}"

      - name: Pilot Test B — execute against Gemini
        if: ${{ github.event.inputs.execute == 'true' }}
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: |
          set -euo pipefail
          python3 benchmarks/v4.1/runner/runner.py pilot-test-b \
            --users "${INPUT_USERS:-10}" \
            --provider gemini \
            --model gemini-2.5-flash \
            --temperature 0.2 \
            --max-output-tokens 512 \
            --concurrency "${INPUT_CONCURRENCY:-2}" \
            --batch-size 10 \
            --sleep-between-batches 1.0 \
            --retry-max "${INPUT_RETRY_MAX:-5}" \
            --retry-backoff "${INPUT_RETRY_BACKOFF:-2}" \
            --retry-backoff-max "${INPUT_RETRY_BACKOFF_MAX:-30}" \
            --retry-jitter 0.25 \
            --execute

      - name: Locate Test B pilot run directory
        id: locate
        if: ${{ github.event.inputs.execute == 'true' }}
        run: |
          set -euo pipefail
          run_dir="$(find benchmarks/v4.1/results -type d -path '*/pilot_test_b/pilot_*' -print 2>/dev/null \
                      | sort | tail -n 1)"
          if [ -z "${run_dir}" ]; then
            echo "No Test B pilot run directory found under benchmarks/v4.1/results/*/pilot_test_b/." >&2
            exit 1
          fi
          echo "run_dir=${run_dir}" >> "$GITHUB_OUTPUT"
          echo "Run dir: ${run_dir}"

      - name: Audit Test B pilot output
        if: ${{ github.event.inputs.execute == 'true' }}
        run: |
          set -euo pipefail
          python3 benchmarks/v4.1/runner/audit_b.py "${{ steps.locate.outputs.run_dir }}"

      - name: Job summary
        if: always()
        run: |
          set -euo pipefail
          {
            echo "## v4.1 Gemini Test B pilot — controlled run"
            echo ""
            echo "- users: \`${INPUT_USERS:-10}\` (hard cap 10)"
            echo "- concurrency: \`${INPUT_CONCURRENCY:-2}\` (hard cap 2)"
            echo "- seed: \`${INPUT_SEED:-4242}\`"
            echo "- sessions_per_user: \`${INPUT_SESSIONS_PER_USER:-15}\`"
            echo "- provider: \`${INPUT_PROVIDER:-gemini}\` (only \`gemini\` is allowed)"
            echo "- execute: \`${INPUT_EXECUTE:-true}\`"
            echo "- retry_max: \`${INPUT_RETRY_MAX:-5}\` (cap 8; retries only on 429/5xx/UNAVAILABLE/RESOURCE_EXHAUSTED)"
            echo "- retry_backoff: \`${INPUT_RETRY_BACKOFF:-2}s\` (exponential with jitter)"
            echo "- retry_backoff_max: \`${INPUT_RETRY_BACKOFF_MAX:-30}s\` (cap 30s)"
            echo ""
            echo "No publish / no tag / no release / no Zenodo / no npm / no PyPI."
            echo "This harness makes **no** Mem0 compatibility claim."
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Upload artifacts (fixtures manifest, plan, raw outputs, errors, metrics, audit)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: benchmark-v41-pilot-testb-${{ github.run_id }}
          if-no-files-found: warn
          retention-days: 14
          path: |
            benchmarks/v4.1/fixtures/generated/manifest.json
            benchmarks/v4.1/results/**/dry_run/planned_run.json
            benchmarks/v4.1/results/**/pilot_test_b/planned_run.json
            benchmarks/v4.1/results/**/pilot_test_b/pilot_*/raw_outputs.jsonl
            benchmarks/v4.1/results/**/pilot_test_b/pilot_*/errors.jsonl
            benchmarks/v4.1/results/**/pilot_test_b/pilot_*/metrics_summary.json
            benchmarks/v4.1/results/**/pilot_test_b/pilot_*/run_manifest.json
            benchmarks/v4.1/results/**/pilot_test_b/pilot_*/audit_report.md
            benchmarks/v4.1/results/**/pilot_test_b/pilot_*/audit_report.json
            benchmarks/v4.1/results/**/pilot_test_b/pilot_*/*.log
